#### Minimal OpenSIPS config for EC simulator (LAN)
#### - registrar/usrloc for REGISTER
#### - lookup(location) + relay for INVITE/BYE/ACK
#### - no RTP proxying (RTP is end-to-end)

log_level=3
stderror_enabled=yes
syslog_enabled=no

udp_workers=2

# Listen on all interfaces for multi-host runs.
socket=udp:0.0.0.0:5060

#### Modules
mpath="/usr/lib/x86_64-linux-gnu/opensips/modules/"

loadmodule "signaling.so"
loadmodule "sl.so"
loadmodule "tm.so"
loadmodule "rr.so"
loadmodule "maxfwd.so"
loadmodule "textops.so"
loadmodule "sipmsgops.so"
loadmodule "usrloc.so"
loadmodule "registrar.so"

loadmodule "proto_udp.so"

modparam("usrloc", "working_mode_preset", "single-instance-no-db")

#### Routing
route {
	if (!mf_process_maxfwd_header(10)) {
		send_reply(483, "Too Many Hops");
		exit;
	}

	# Hop-by-hop CANCEL must be matched against existing transaction.
	if (is_method("CANCEL")) {
		if (t_check_trans()) {
			t_relay();
		}
		exit;
	}

	if (has_totag()) {
		# In-dialog
		if (loose_route()) {
			t_relay();
			exit;
		}
		# ACK for non-2xx final response is handled by transaction layer.
		if (is_method("ACK") && t_check_trans()) {
			t_relay();
			exit;
		}
		send_reply(404, "Not here");
		exit;
	}

	# Handle INVITE retransmissions via existing transaction.
	if (is_method("INVITE") && t_check_trans()) {
		t_relay();
		exit;
	}

	if (is_method("OPTIONS")) {
		send_reply(200, "OK");
		exit;
	}

	if (is_method("REGISTER")) {
		if (!save("location")) {
			send_reply(500, "Register failed");
		}
		exit;
	}

	if (is_method("INVITE|ACK|BYE")) {
		if (!lookup("location")) {
			send_reply(404, "Not Found");
			exit;
		}
		record_route();
		t_relay();
		exit;
	}

	send_reply(405, "Method Not Allowed");
	exit;
}

